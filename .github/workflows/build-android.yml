name: Build Android APK

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup EAS
        uses: expo/expo-github-action@v9
        with:
          eas-version: latest
          token: ${{ secrets.EAS_TOKEN }}

      - name: Install EAS dependencies
        run: npx eas-cli install

      - name: Generate Native Android Project
        run: npx expo prebuild --platform android --clean

      - name: Build Android APK (Preview)
        run: npx eas-cli build --platform android --profile preview --local --non-interactive

      - name: Download APK artifact
        run: |
          cd android/app/build/outputs/apk
          # Find the APK file
          find . -name "*.apk" -type f

      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: Aura-APK
          path: android/app/build/outputs/apk/**/*.apk
          retention-days: 7

      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/') && github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          files: android/app/build/outputs/apk/**/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}