name: Aura Notes - Build & Release

on:
  push:
    branches:
      - "main"
    tags:
      - "v*"
  workflow_dispatch:

env:
  EXPO_PROJECT_PATH: ./

jobs:
  build-android:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Set up JDK 17
        id: setup-java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Dependencies
        run: npm install

      - name: Generate Native Android Project
        run: npx expo prebuild --platform android --clean

      - name: Setup Gradle Files
        run: |
          mkdir -p android/gradle/wrapper
          
          echo "distributionBase=GRADLE_USER_HOME" > android/gradle/wrapper/gradle-wrapper.properties
          echo "distributionPath=wrapper/dists" >> android/gradle/wrapper/gradle-wrapper.properties
          echo "distributionUrl=https\://services.gradle.org/distributions/gradle-8.11.1-bin.zip" >> android/gradle/wrapper/gradle-wrapper.properties
          echo "zipStoreBase=GRADLE_USER_HOME" >> android/gradle/wrapper/gradle-wrapper.properties
          echo "zipStorePath=wrapper/dists" >> android/gradle/wrapper/gradle-wrapper.properties

          curl -L -o android/gradle/wrapper/gradle-wrapper.jar \
          https://github.com/AntennaPod/AntennaPod/raw/master/gradle/wrapper/gradle-wrapper.jar

          curl -L -o android/gradlew \
          https://github.com/AntennaPod/AntennaPod/raw/master/gradlew

          chmod +x android/gradlew

      - name: Configure Gradle Properties
        run: |
          mkdir -p ~/.gradle
          echo "org.gradle.jvmargs=-Xmx2048m -XX:MaxMetaspaceSize=512m" >> ~/.gradle/gradle.properties
          echo "org.gradle.parallel=true" >> ~/.gradle/gradle.properties
          echo "org.gradle.caching=true" >> ~/.gradle/gradle.properties
          echo "org.gradle.configureondemand=true" >> ~/.gradle/gradle.properties

      - name: Build Split Debug APKs
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Rename APKs with Version
        run: |
          cd android/app/build/outputs/apk/debug
          for apk in *.apk; do
            new_name="Aura-v1.0.0-${apk##*-}"
            cp "$apk" "$new_name"
          done
          ls -la

      - name: Upload Debug APKs
        uses: actions/upload-artifact@v4
        with:
          name: Aura-Debug-APKs
          path: android/app/build/outputs/apk/debug/*.apk
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: android/app/build/outputs/apk/debug/*.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Release APKs
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: Aura-Release-APKs-v${{ github.run_number }}
          path: android/app/build/outputs/apk/debug/*.apk

  build-universal-apk:
    runs-on: ubuntu-latest
    needs: build-android
    
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Set up JDK 17
        id: setup-java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Dependencies
        run: npm install

      - name: Generate Native Android Project
        run: npx expo prebuild --platform android --clean

      - name: Setup Gradle Files
        run: |
          mkdir -p android/gradle/wrapper
          
          echo "distributionBase=GRADLE_USER_HOME" > android/gradle/wrapper/gradle-wrapper.properties
          echo "distributionPath=wrapper/dists" >> android/gradle/wrapper/gradle-wrapper.properties
          echo "distributionUrl=https\://services.gradle.org/distributions/gradle-8.11.1-bin.zip" >> android/gradle/wrapper/gradle-wrapper.properties
          echo "zipStoreBase=GRADLE_USER_HOME" >> android/gradle/wrapper/gradle-wrapper.properties
          echo "zipStorePath=wrapper/dists" >> android/gradle/wrapper/gradle-wrapper.properties

          curl -L -o android/gradle/wrapper/gradle-wrapper.jar \
          https://github.com/AntennaPod/AntennaPod/raw/master/gradle/wrapper/gradle-wrapper.jar

          curl -L -o android/gradlew \
          https://github.com/AntennaPod/AntennaPod/raw/master/gradlew

          chmod +x android/gradlew

      - name: Build Universal Debug APK
        run: |
          cd android
          ./gradlew assembleDebug -PuniversalApk=true

      - name: Upload Universal APK
        uses: actions/upload-artifact@v4
        with:
          name: Aura-Universal-APK
          path: android/app/build/outputs/apk/debug/*.apk
          retention-days: 30

  notify:
    runs-on: ubuntu-latest
    needs: [build-android, build-universal-apk]
    if: always()
    
    steps:
      - name: Build Summary
        run: |
          echo "## ✅ Aura Notes Build Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| APK Type | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Split APKs | ✅ Built |" >> $GITHUB_STEP_SUMMARY
          echo "| Universal APK | ✅ Built |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Run Number:** ${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY
          echo "**Date:** $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
